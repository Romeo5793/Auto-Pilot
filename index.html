<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>株価診断アプリ - 初期設定</title>
    <style>
        /* おじいちゃん向け：全体的に文字を大きく、余白を広くとる */
        body {
            font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
            background-color: #f4f7f6;
            color: #333;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h1 {
            font-size: 1.8rem;
            color: #2c3e50;
            border-bottom: 4px solid #3498db;
            padding-bottom: 10px;
            text-align: center;
        }
        .intro-text {
            font-size: 1.2rem;
            margin-bottom: 30px;
            background-color: #fff8e1;
            padding: 15px;
            border-radius: 8px;
            border-left: 6px solid #ffc107;
        }
        
        /* 入力エリアの装飾 */
        .input-group {
            background-color: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 25px;
        }
        label {
            display: block;
            font-size: 1.4rem;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 10px;
        }
        .description {
            font-size: 1.1rem;
            color: #555;
            margin-bottom: 15px;
        }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 15px;
            font-size: 1.3rem;
            border: 2px solid #bdc3c7;
            border-radius: 8px;
            box-sizing: border-box;
            background-color: #fff;
        }
        input[type="text"]:focus, input[type="password"]:focus {
            border-color: #3498db;
            outline: none;
            box-shadow: 0 0 8px rgba(52, 152, 219, 0.3);
        }
        
        /* 取得リンクのボタン化 */
        .get-key-link {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 15px;
            background-color: #ecf0f1;
            color: #2980b9;
            text-decoration: none;
            font-weight: bold;
            border-radius: 6px;
            border: 1px solid #bdc3c7;
            font-size: 1.1rem;
        }
        .get-key-link:hover {
            background-color: #e0e6ed;
        }

        /* 保存ボタンを超特大に */
        .save-btn {
            width: 100%;
            padding: 20px;
            font-size: 1.6rem;
            font-weight: bold;
            background-color: #27ae60;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 5px 0 #219150;
            transition: all 0.1s;
            margin-top: 20px;
        }
        .save-btn:active {
            transform: translateY(5px);
            box-shadow: none;
        }

        /* 保存完了メッセージ */
        #success-message {
            display: none;
            margin-top: 20px;
            padding: 15px;
            background-color: #d4edda;
            color: #155724;
            border: 2px solid #c3e6cb;
            border-radius: 8px;
            font-size: 1.4rem;
            font-weight: bold;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>株価診断アプリ 初期設定</h1>
    
    <div class="intro-text">
        お使いいただく前に、アプリを動かすための**「3つの専用パスワード（APIキー）」**を登録してください。<br>
        一度保存すれば、次回からは入力不要です。
    </div>

    <div class="input-group">
        <label for="gemini-key">1. AIの頭脳（Gemini）のパスワード</label>
        <div class="description">アプリが株価を分析してアドバイスをするために必要です。</div>
        <input type="password" id="gemini-key" placeholder="AIzaSy... から始まる文字">
        <a href="https://aistudio.google.com/app/apikey" target="_blank" class="get-key-link">👉 ここを押してGoogleから取得</a>
    </div>

    <div class="input-group">
        <label for="finnhub-key">2. 米国株データ（Finnhub）のパスワード</label>
        <div class="description">最新の株価や、企業の成績（PERなど）を見るために必要です。</div>
        <input type="password" id="finnhub-key" placeholder="c... から始まる文字">
        <a href="https://finnhub.io/register" target="_blank" class="get-key-link">👉 ここを押してFinnhubから取得</a>
    </div>

    <div class="input-group">
        <label for="tavily-key">3. 最新ニュース（Tavily）のパスワード</label>
        <div class="description">市場のニュースを自動で集めて、危険がないかチェックするために必要です。</div>
        <input type="password" id="tavily-key" placeholder="tvly-... から始まる文字">
        <a href="https://app.tavily.com/sign-in" target="_blank" class="get-key-link">👉 ここを押してTavilyから取得</a>
    </div>

    <button class="save-btn" onclick="saveKeys()">このパスワードを保存する</button>

    <div id="success-message">
        🎉 保存しました！<br>これでアプリを使う準備が整いました。
    </div>
</div>

<script>
    // 画面が開かれたときに、すでに保存されているキーがあれば入力欄にセットする
    window.onload = function() {
        const storedGemini = localStorage.getItem('gemini_api_key');
        const storedFinnhub = localStorage.getItem('finnhub_api_key');
        const storedTavily = localStorage.getItem('tavily_api_key');

        if (storedGemini) document.getElementById('gemini-key').value = storedGemini;
        if (storedFinnhub) document.getElementById('finnhub-key').value = storedFinnhub;
        if (storedTavily) document.getElementById('tavily-key').value = storedTavily;
    };

    // 保存ボタンが押されたときの処理
    function saveKeys() {
        // 入力された値を取得
        const geminiKey = document.getElementById('gemini-key').value.trim();
        const finnhubKey = document.getElementById('finnhub-key').value.trim();
        const tavilyKey = document.getElementById('tavily-key').value.trim();

        // 空っぽのまま保存しようとした場合の軽い警告
        if (!geminiKey || !finnhubKey || !tavilyKey) {
            alert("入力されていないパスワードがあります。\n後で入力することもできますが、すべての機能を使うには3つとも必要です。");
        }

        // ブラウザのローカルストレージに安全に保存
        localStorage.setItem('gemini_api_key', geminiKey);
        localStorage.setItem('finnhub_api_key', finnhubKey);
        localStorage.setItem('tavily_api_key', tavilyKey);

        // 成功メッセージを表示するアニメーション
        const successMsg = document.getElementById('success-message');
        successMsg.style.display = 'block';
        
        // 3秒後にメッセージをフワッと消す
        setTimeout(() => {
            successMsg.style.display = 'none';
        }, 3000);
    }
</script>

</body>
</html>
